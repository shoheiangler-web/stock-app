<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  header { background: #1e293b; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; color: #f1f5f9; }

  nav { display: flex; gap: 4px; }
  nav button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; background: transparent; color: #94a3b8; transition: all 0.15s; }
  nav button.active { background: #3b82f6; color: white; }
  nav button:hover:not(.active) { background: #334155; color: #e2e8f0; }

  .page { display: none; padding: 20px; max-width: 960px; margin: 0 auto; }
  .page.active { display: block; }

  /* サマリーカード */
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
  .card { background: #1e293b; border-radius: 12px; padding: 16px; border: 1px solid #334155; }
  .card .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .card .value { font-size: 22px; font-weight: 700; }
  .card .value.neutral { color: #e2e8f0; }

  /* ポジションテーブル */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-header h2 { font-size: 15px; font-weight: 600; color: #94a3b8; }

  .btn-add { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-add:hover { background: #2563eb; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #334155; }
  td { padding: 12px; border-bottom: 1px solid #1e293b; font-size: 14px; vertical-align: middle; }
  tr:hover td { background: #1e293b; }

  .ticker { font-weight: 700; font-size: 15px; color: #f1f5f9; }
  .ticker span { display: block; font-size: 11px; font-weight: 400; color: #64748b; margin-top: 2px; }

  /* 残り日数バッジ */
  .days-badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .days-badge.urgent { background: #7f1d1d; color: #fca5a5; }
  .days-badge.warning { background: #78350f; color: #fcd34d; }
  .days-badge.ok { background: #14532d; color: #86efac; }

  /* アクションボタン */
  .btn-sm { padding: 5px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; margin-left: 4px; }
  .btn-settle { background: #064e3b; color: #34d399; }
  .btn-settle:hover { background: #065f46; }
  .btn-delete { background: #450a0a; color: #f87171; }
  .btn-delete:hover { background: #7f1d1d; }

  /* インライン編集入力 */
  .inline-input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 5px 8px; border-radius: 6px; font-size: 13px; width: 100px; text-align: right; }
  .inline-input:focus { outline: none; border-color: #3b82f6; }
  .inline-input::-webkit-inner-spin-button { opacity: 1; }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1e293b; border-radius: 16px; padding: 24px; width: 100%; max-width: 420px; border: 1px solid #334155; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; position: relative; }
  label { display: block; font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: 500; }
  input, select { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 12px; border-radius: 8px; font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: #3b82f6; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary { flex: 1; background: #3b82f6; color: white; border: none; padding: 11px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .btn-primary:hover { background: #2563eb; }
  .btn-cancel { flex: 1; background: #334155; color: #94a3b8; border: none; padding: 11px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .btn-cancel:hover { background: #475569; }

  /* 銘柄サジェスト */
  .suggest-list { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border: 1px solid #3b82f6; border-radius: 8px; z-index: 300; max-height: 180px; overflow-y: auto; }
  .suggest-item { padding: 9px 12px; cursor: pointer; font-size: 13px; display: flex; gap: 10px; align-items: center; }
  .suggest-item:hover { background: #334155; }
  .suggest-item .code { font-weight: 700; color: #93c5fd; min-width: 44px; }
  .suggest-item .name { color: #e2e8f0; }

  /* 決済モーダル */
  .settle-info { background: #0f172a; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 13px; line-height: 1.8; }
  .settle-info .row { display: flex; justify-content: space-between; }

  /* 履歴 */
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item { background: #1e293b; border-radius: 10px; padding: 14px 16px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
  .history-item .meta { font-size: 12px; color: #64748b; margin-top: 4px; }
  .history-pnl { font-size: 18px; font-weight: 700; }
  .pnl.pos { color: #34d399; }
  .pnl.neg { color: #f87171; }

  .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
  .empty-state p { margin-top: 8px; font-size: 14px; }
</style>
</head>

<header>
  <h1>📈 株管理</h1>
  <nav>
    <button class="active" onclick="showPage('positions', this)">保有</button>

</header>

</div>

<!-- 履歴画面 -->
<div id="page-history" class="page">

  </div>
</div>

<!-- 追加モーダル -->
<div id="add-modal" class="modal-overlay">
  <div class="modal">
    <h2>ポジション追加</h2>
    <div class="form-row">
      <div class="form-group">
        <label>銘柄コード</label>
        <input id="f-code" type="text" placeholder="例: 7203" maxlength="5" autocomplete="off" oninput="onCodeInput(this)">
        <div id="suggest-list" class="suggest-list" style="display:none"></div>
      </div>
      <div class="form-group">
        <label>銘柄名</label>
        <input id="f-name" type="text" placeholder="自動入力">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>買い付け単価（予定）</label>
        <input id="f-buy" type="number" placeholder="例: 3500" oninput="onBuyInput()">
      </div>
      <div class="form-group">
        <label>買い付け単価（実施）</label>
        <input id="f-actual" type="number" placeholder="約定後に入力">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>株数</label>
        <input id="f-qty" type="number" placeholder="例: 85">
      </div>
      <div class="form-group">
        <label>購入日</label>
        <input id="f-date" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>逆指値（円）← 実施×0.98</label>
        <input id="f-stop" type="number" placeholder="自動計算">
      </div>
      <div class="form-group">
        <label>利確価格（円）← 実施×1.20</label>
        <input id="f-tp" type="number" placeholder="自動計算">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">キャンセル</button>
      <button class="btn-primary" onclick="addPosition()">追加</button>
    </div>
  </div>
</div>

<!-- 決済モーダル -->
<div id="settle-modal" class="modal-overlay">

    <h2>決済記録</h2>
    <div id="settle-info" class="settle-info"></div>
    <div class="form-group">

      <input id="s-price" type="number" placeholder="決済した価格">
    </div>
    <div class="form-group">
      <label>決済理由</label>
      <select id="s-reason">
        <option value="利確">利確（+15%）</option>
        <option value="損切り">損切り（-3%）</option>
        <option value="期間満了">期間満了（20営業日）</option>
        <option value="手動">手動決済</option>

    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettleModal()">キャンセル</button>
      <button class="btn-primary" onclick="confirmSettle()">確定</button>
    </div>
  </div>
</div>

// ===== 営業日計算 =====
const HOLIDAYS = new Set([
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05',

]);

function isBusinessDay(d) {
  const day = d.getDay();
  if (day === 0 || day === 6) return false;
  return !HOLIDAYS.has(d.toISOString().slice(0,10));
}
function addBusinessDays(dateStr, n) {
  let d = new Date(dateStr);
  let count = 0;
  while (count < n) { d.setDate(d.getDate()+1); if (isBusinessDay(d)) count++; }
  return d;
}
function countBusinessDaysElapsed(fromStr) {
  let d = new Date(fromStr);
  const today = new Date(); today.setHours(0,0,0,0);
  let count = 0;
  d.setDate(d.getDate()+1);
  while (d <= today) { if (isBusinessDay(d)) count++; d.setDate(d.getDate()+1); }
  return count;
}

// ===== ユーティリティ =====
function fmt(n) { return (n>=0?'+':'')+n.toLocaleString('ja-JP')+'円'; }
function fmtY(n) { return '¥'+Math.round(n).toLocaleString('ja-JP'); }

// ===== スクロール（ホイール）で数値増減 =====
function addWheelToInputs() {
  document.querySelectorAll('input[type=number]').forEach(el => {
    if (el.dataset.wheelAdded) return;
    el.dataset.wheelAdded = '1';
    el.addEventListener('wheel', function(e) {
      e.preventDefault();
      const step = parseFloat(this.step) || 1;
      const val = parseFloat(this.value) || 0;
      this.value = e.deltaY < 0 ? val + step : Math.max(0, val - step);
      // モーダル内input（id付き）はinputイベント、テーブル内はchangeイベント
      const evt = this.closest('.modal') ? 'input' : 'change';
      this.dispatchEvent(new Event(evt, {bubbles:true}));
    }, {passive:false});
  });
}

  btn.classList.add('active');
  if (name === 'positions') renderPositions();
  if (name === 'history') renderHistory();
}

// ===== ポジション描画 =====
function renderPositions() {
  const positions = load(STORE_POS);
  const tbody = document.getElementById('positions-tbody');
  const empty = document.getElementById('positions-empty');

  if (positions.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('summary-cost').textContent = '¥0';
    document.getElementById('summary-count').textContent = '0銘柄';
    return;
  }
  empty.style.display = 'none';

  let totalCost = 0;
  tbody.innerHTML = positions.map((p, i) => {
    const cost = (p.actualPrice != null ? p.actualPrice : p.buyPrice) * p.qty;
    totalCost += cost;
    const elapsed = countBusinessDaysElapsed(p.date);
    const remaining = 20 - elapsed;
    let badgeClass = remaining <= 3 ? 'urgent' : remaining <= 7 ? 'warning' : 'ok';
    const deadlineStr = addBusinessDays(p.date, 20).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});

    return `<tr>
      <td><div class="ticker">${p.code}<span>${p.name||''}</span></div></td>
      <td style="color:#94a3b8;font-size:13px">${p.buyPrice.toLocaleString()}円</td>
      <td>
        <input class="inline-input" type="number" value="${p.actualPrice != null ? p.actualPrice : ''}" step="1"
          placeholder="未入力" onchange="updateField(${i},'actualPrice',this.value)">
      </td>
      <td>${p.qty}株</td>
      <td style="font-size:12px;color:#64748b">
        ▼ ${p.stopLoss.toLocaleString()}円<br>
        ▲ ${p.takeProfit.toLocaleString()}円
      </td>
      <td>
        <span class="days-badge ${badgeClass}">${remaining>0?remaining+'日':'期限！'}</span>
        <div style="font-size:10px;color:#64748b;margin-top:4px">${deadlineStr}まで</div>
      </td>
      <td style="white-space:nowrap">
        <button class="btn-sm btn-settle" onclick="openSettleModal(${i})">決済</button>
        <button class="btn-sm btn-delete" onclick="deletePosition(${i})">削除</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('summary-cost').textContent = fmtY(totalCost);
  document.getElementById('summary-count').textContent = positions.length+'銘柄';
  addWheelToInputs();
}

function updateField(idx, field, val) {
  const positions = load(STORE_POS);
  const v = parseFloat(val);
  if (!isNaN(v) && v > 0) {
    positions[idx][field] = v;
    // 買値変更時に逆指値・利確も再計算
    if (field === 'buyPrice') {
      positions[idx].stopLoss = Math.floor(v * 0.98);
      positions[idx].takeProfit = Math.ceil(v * 1.20);
    }
    save(STORE_POS, positions);
    renderPositions();
  }
}

function deletePosition(idx) {
  const positions = load(STORE_POS);
  const p = positions[idx];
  if (!confirm(`${p.code} ${p.name||''} を削除しますか？\n（履歴には残りません）`)) return;
  positions.splice(idx, 1);
  save(STORE_POS, positions);
  renderPositions();
}

// ===== 銘柄サジェスト =====
function onCodeInput(el) {
  const q = el.value.trim();
  const list = document.getElementById('suggest-list');
  if (!q) { list.style.display='none'; return; }

  const matches = Object.entries(STOCKS).filter(([code, name]) =>
    code.startsWith(q) || name.includes(q)
  ).slice(0, 8);

  if (matches.length === 0) { list.style.display='none'; return; }

  list.innerHTML = matches.map(([code, name]) =>
    `<div class="suggest-item" onclick="selectStock('${code}','${name}')">
      <span class="code">${code}</span><span class="name">${name}</span>
    </div>`
  ).join('');
  list.style.display = 'block';
}

function selectStock(code, name) {
  document.getElementById('f-code').value = code;
  document.getElementById('f-name').value = name;
  document.getElementById('suggest-list').style.display = 'none';
}

// ===== 追加モーダル =====
function openAddModal() {
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => { document.getElementById('f-code').focus(); addWheelToInputs(); }, 50);
}
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
  document.getElementById('suggest-list').style.display = 'none';
  ['f-code','f-name','f-buy','f-actual','f-qty','f-stop','f-tp'].forEach(id => document.getElementById(id).value='');
}
function onBuyInput() {
  // 逆指値・利確は実施単価を優先、なければ予定単価で計算
  const planned = parseFloat(document.getElementById('f-buy').value);
  const actual  = parseFloat(document.getElementById('f-actual').value);
  const base = actual || planned;
  if (base) {
    document.getElementById('f-stop').value = Math.floor(base * 0.98);
    document.getElementById('f-tp').value   = Math.ceil(base * 1.20);
  }
}
document.addEventListener('input', e => {
  if (e.target.id === 'f-actual') onBuyInput();
});

// サジェスト外クリックで閉じる
document.addEventListener('click', e => {
  if (!e.target.closest('#suggest-list') && !e.target.closest('#f-code')) {
    document.getElementById('suggest-list').style.display = 'none';
  }
});

function addPosition() {
  const code = document.getElementById('f-code').value.trim();
  const buy  = parseFloat(document.getElementById('f-buy').value);
  const qty  = parseInt(document.getElementById('f-qty').value);
  const date = document.getElementById('f-date').value;
  if (!code || !buy || !qty || !date) { alert('銘柄コード・買値・株数・購入日は必須です'); return; }

  const actualPrice = parseFloat(document.getElementById('f-actual').value) || null;
  const base = actualPrice || buy;
  const stop = parseFloat(document.getElementById('f-stop').value) || Math.floor(base * 0.98);
  const tp   = parseFloat(document.getElementById('f-tp').value)   || Math.ceil(base * 1.20);
  const name = document.getElementById('f-name').value.trim() || STOCKS[code] || '';

  const positions = load(STORE_POS);
  positions.push({ code, name, buyPrice:buy, qty, date, stopLoss:stop, takeProfit:tp, actualPrice });
  save(STORE_POS, positions);
  closeAddModal();
  renderPositions();
}

// ===== 決済モーダル =====
let settleIdx = null;
function openSettleModal(idx) {
  settleIdx = idx;
  const p = load(STORE_POS)[idx];
  document.getElementById('settle-info').innerHTML = `
    <div class="row"><span>銘柄</span><span>${p.code} ${p.name||''}</span></div>
    <div class="row"><span>株数</span><span>${p.qty}株</span></div>
    <div class="row"><span>買値</span><span>${p.buyPrice.toLocaleString()}円</span></div>
    <div class="row"><span>買い付け金額</span><span>${fmtY(p.buyPrice*p.qty)}</span></div>
  `;
  document.getElementById('s-price').value = p.buyPrice;
  document.getElementById('settle-modal').classList.add('open');
  setTimeout(addWheelToInputs, 50);
}
function closeSettleModal() { document.getElementById('settle-modal').classList.remove('open'); settleIdx=null; }

function confirmSettle() {
  const price = parseFloat(document.getElementById('s-price').value);
  const reason = document.getElementById('s-reason').value;
  if (!price) { alert('決済価格を入力してください'); return; }

  const positions = load(STORE_POS);
  const p = positions[settleIdx];
  const pnl = Math.round((price - p.buyPrice) * p.qty);

  const history = load(STORE_HIST);
  history.unshift({ code:p.code, name:p.name, qty:p.qty, buyPrice:p.buyPrice, sellPrice:price, pnl, reason, buyDate:p.date, sellDate:new Date().toISOString().slice(0,10) });
  save(STORE_HIST, history);
  positions.splice(settleIdx, 1);
  save(STORE_POS, positions);
  closeSettleModal();
  renderPositions();
}

// ===== 履歴描画 =====
function renderHistory() {
  const history = load(STORE_HIST);
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');

  if (history.length === 0) {
    list.innerHTML=''; empty.style.display='block';
    document.getElementById('hist-total').textContent='¥0';
    document.getElementById('hist-total').className='value neutral';
    document.getElementById('hist-count').textContent='0件';
    return;
  }
  empty.style.display='none';

  const total = history.reduce((s,h)=>s+h.pnl, 0);
  const wins = history.filter(h=>h.pnl>0).length;
  const winrate = Math.round(wins/history.length*100);

  const totalEl = document.getElementById('hist-total');
  totalEl.textContent = (total>=0?'+¥':'-¥')+Math.abs(total).toLocaleString();
  totalEl.className = 'value '+(total>=0?'pnl pos':'pnl neg');
  document.getElementById('hist-count').textContent = `${history.length}件 / 勝率${winrate}%`;

  list.innerHTML = history.map(h => `
    <div class="history-item">
      <div>
        <div style="font-weight:700">${h.code} ${h.name||''}</div>
        <div class="meta">${h.buyDate} 買 → ${h.sellDate} 売 ／ ${h.reason} ／ ${h.qty}株</div>
        <div class="meta">買値 ${h.buyPrice.toLocaleString()}円 → 売値 ${h.sellPrice.toLocaleString()}円</div>
      </div>
      <div class="history-pnl ${h.pnl>=0?'pnl pos':'pnl neg'}">${fmt(h.pnl)}</div>
    </div>
  `).join('');
}

// ===== 初期描画 =====
renderPositions();
</script>
</body>
</html>
